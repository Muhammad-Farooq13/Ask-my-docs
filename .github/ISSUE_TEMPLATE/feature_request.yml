name: Feature Request
description: Suggest a new feature or improvement for AskMyDocs
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement!
        Please check existing issues / discussions before submitting.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? Who benefits?
      placeholder: "As a user who ingests PDFs, I need ... so that ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered?
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      multiple: true
      options:
        - Ingestion (loader / chunker)
        - Retrieval (BM25 / vector / hybrid)
        - Reranking
        - Generation (prompts / LLM)
        - Evaluation pipeline
        - FastAPI
        - Streamlit UI
        - Docker / deployment
        - CI/CD
        - Documentation
    validations:
      required: true
