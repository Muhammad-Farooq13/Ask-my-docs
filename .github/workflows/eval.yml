name: Evaluation Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "data/eval/**"
      - "requirements.txt"

jobs:
  integration-tests:
    name: Integration tests (no LLM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  eval-gate:
    name: RAG evaluation gate
    runs-on: ubuntu-latest
    # Only run on non-fork PRs where secrets are available
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs: [integration-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Ingest evaluation corpus
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/ingest.py --source data/raw --reset

      - name: Run evaluation pipeline
        id: eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
        run: |
          python scripts/evaluate.py \
            --dataset data/eval/golden_dataset.jsonl \
            --output data/eval/report.json \
            --fail-on-threshold

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report-${{ github.sha }}
          path: data/eval/report.json
          retention-days: 30
