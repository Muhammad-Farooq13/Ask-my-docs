services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      # Persist the index between container restarts
      - ../data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install streamlit requests -q &&
             streamlit run ui/app.py
               --server.port 8501
               --server.address 0.0.0.0
               --server.headless true"
    ports:
      - "8501:8501"
    volumes:
      - ../ui:/app/ui
    environment:
      - API_BASE=http://api:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
